  <script>
  (function() {
    var FEATURE_URL = "https://services3.arcgis.com/9coHY2fvuFjG9HQX/ArcGIS/rest/services/dc_datatrustdimensions_ahp/FeatureServer/0";
    function encode(params) {
      return Object.keys(params).map(function(k) {
        return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
      }).join("&");
    }
    function post(endpoint, params) {
      params.f = "json";
      return fetch(FEATURE_URL + "/" + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: encode(params)
      }).then(function(r) { return r.json(); });
    }
    window.storage = {
      get: function(key, shared) {
        var where = "storage_key='" + key.replace(/'/g, "''") + "'";
        return fetch(FEATURE_URL + "/query?" + encode({
          where: where, outFields: "storage_key,storage_value", returnGeometry: false, f: "json"
        })).then(function(r) { return r.json(); }).then(function(data) {
          if (!data.features || data.features.length === 0) throw new Error("Key not found: " + key);
          return { key: key, value: data.features[0].attributes.storage_value, shared: !!shared };
        });
      },
      set: function(key, value, shared) {
        var where = "storage_key='" + key.replace(/'/g, "''") + "'";
        return fetch(FEATURE_URL + "/query?" + encode({
          where: where, outFields: "OBJECTID", returnGeometry: false, f: "json"
        })).then(function(r) { return r.json(); }).then(function(data) {
          if (data.features && data.features.length > 0) {
            var oid = data.features[0].attributes.OBJECTID;
            return post("updateFeatures", { features: JSON.stringify([{ attributes: { OBJECTID: oid, storage_key: key, storage_value: value } }]) });
          } else {
            return post("addFeatures", { features: JSON.stringify([{ attributes: { storage_key: key, storage_value: value } }]) });
          }
        }).then(function() { return { key: key, value: value, shared: !!shared }; });
      },
      delete: function(key, shared) {
        var where = "storage_key='" + key.replace(/'/g, "''") + "'";
        return post("deleteFeatures", { where: where }).then(function(data) {
          return { key: key, deleted: !!(data.deleteResults && data.deleteResults.length > 0), shared: !!shared };
        });
      },
      list: function(prefix, shared) {
        var where = prefix ? "storage_key LIKE '" + prefix.replace(/'/g, "''") + "%'" : "1=1";
        return fetch(FEATURE_URL + "/query?" + encode({
          where: where, outFields: "storage_key", returnGeometry: false, returnDistinctValues: true, f: "json"
        })).then(function(r) { return r.json(); }).then(function(data) {
          var keys = [];
          if (data.features) data.features.forEach(function(f) { keys.push(f.attributes.storage_key); });
          return { keys: keys, prefix: prefix, shared: !!shared };
        });
      }
    };
  })();

const SAATY_SCALE = [
  { value: 1/9, label: "9" }, { value: 1/7, label: "7" }, { value: 1/5, label: "5" },

const RI_TABLE = { 1:0, 2:0, 3:0.58, 4:0.9, 5:1.12, 6:1.24, 7:1.32, 8:1.41, 9:1.45, 10:1.49 };
const DEFAULT_ADMIN_PASSCODE = "admin2026";
const COLORS = ["#002669","#C24200","#83AC16","#0088FF","#9E0059","#140233","#E5D086","#FFDB22"];

// ── Math ──
function computeAHP(matrix, n) {
  const colSums = Array(n).fill(0);
  for (let j = 0; j < n; j++) for (let i = 0; i < n; i++) colSums[j] += matrix[i][j];
  const norm = matrix.map(row => row.map((v, j) => v / colSums[j]));
  const weights = norm.map(row => row.reduce((s, v) => s + v, 0) / n);
  const ws = matrix.map((row, i) => row.reduce((s, v, j) => s + v * weights[j], 0));
  const lm = ws.reduce((s, w, i) => s + w / weights[i], 0) / n;
  const CI = (lm - n) / (n - 1);
  const CR = n <= 2 ? 0 : CI / (RI_TABLE[n] || 1.49);
  return { weights, lambdaMax: lm, CI, CR };
}

function generatePairs(dims) {
  const p = [];
  for (let i = 0; i < dims.length; i++) for (let j = i + 1; j < dims.length; j++) p.push([i, j]);
  return p;
}

function geometricMean(vals) {
  if (!vals.length) return 0;
  return Math.pow(vals.reduce((p, v) => p * v, 1), 1 / vals.length);
}

// ── Storage ──
const S = {
  async getPasscode() {
    try { const r = await window.storage.get("ahp:admin-passcode", true); return r ? r.value : DEFAULT_ADMIN_PASSCODE; } catch { return DEFAULT_ADMIN_PASSCODE; }
  },
  async setPasscode(v) {
    try { await window.storage.set("ahp:admin-passcode", v, true); return true; } catch { return false; }
  },
  async isRevealed() {
    try { const r = await window.storage.get("ahp:revealed", true); return r ? r.value === "true" : false; } catch { return false; }
  },
  async setRevealed(v) {
    try { await window.storage.set("ahp:revealed", v ? "true" : "false", true); return true; } catch { return false; }
  },
  async save(sub) {
    try {
      await window.storage.set(`ahp:sub:${sub.id}`, JSON.stringify(sub), true);
      let ids = [];
      try { const idx = await window.storage.get("ahp:index", true); ids = idx ? JSON.parse(idx.value) : []; } catch { ids = []; }
      if (!ids.includes(sub.id)) { ids.push(sub.id); await window.storage.set("ahp:index", JSON.stringify(ids), true); }
      return true;
    } catch { return false; }
  },
  async loadAll() {
    try {
      let ids = [];
      try { const idx = await window.storage.get("ahp:index", true); ids = idx ? JSON.parse(idx.value) : []; } catch { ids = []; }
      const subs = [];
      for (const id of ids) { try { const r = await window.storage.get(`ahp:sub:${id}`, true); if (r) subs.push(JSON.parse(r.value)); } catch {} }
      return subs;
    } catch { return []; }
  },
  async deleteOne(id) {
    try {
      await window.storage.delete(`ahp:sub:${id}`, true);
      let ids = [];
      try { const idx = await window.storage.get("ahp:index", true); ids = idx ? JSON.parse(idx.value) : []; } catch { ids = []; }
      await window.storage.set("ahp:index", JSON.stringify(ids.filter(i => i !== id)), true);
      return true;
    } catch { return false; }
  },
  async clearAll() {
    try {
      let ids = [];
      try { const idx = await window.storage.get("ahp:index", true); ids = idx ? JSON.parse(idx.value) : []; } catch { ids = []; }
      for (const id of ids) { try { await window.storage.delete(`ahp:sub:${id}`, true); } catch {} }
      await window.storage.set("ahp:index", JSON.stringify([]), true);
      await window.storage.set("ahp:revealed", "false", true);
      return true;
    } catch { return false; }
  },
};

function ComparisonSlider({ left, right, value, onChange }) {
  const si = SAATY_SCALE.findIndex(s => Math.abs(s.value - value) < 0.01);
  const idx = si >= 0 ? si : 4;
  const isL = idx < 4, isR = idx > 4;
  return (
    <div style={{ background: "var(--card-bg)", border: "1px solid var(--border)", borderRadius: 14, padding: "20px 24px", marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16 }}>
        <div style={{ flex: 1, textAlign: "left", opacity: isL || !isR ? 1 : 0.45, transition: "opacity 0.25s" }}>
          <div style={{ fontFamily: "var(--font-heading)", fontWeight: 900, fontSize: 17, color: isL ? "var(--accent-left)" : "var(--text)" }}>{left.name}</div>
          <div style={{ fontSize: 13.5, color: "var(--text-dim)", marginTop: 3, lineHeight: 1.4 }}>{left.desc}</div>
        </div>
        <div style={{ fontFamily: "var(--font-heading)", fontSize: 13, color: "var(--text-dim)", background: "var(--badge-bg)", borderRadius: 6, padding: "3px 8px", flexShrink: 0 }}>vs</div>
        <div style={{ flex: 1, textAlign: "right", opacity: isR || !isL ? 1 : 0.45, transition: "opacity 0.25s" }}>
          <div style={{ fontFamily: "var(--font-heading)", fontWeight: 900, fontSize: 17, color: isR ? "var(--accent-right)" : "var(--text)" }}>{right.name}</div>
          <div style={{ fontSize: 13.5, color: "var(--text-dim)", marginTop: 3, lineHeight: 1.4 }}>{right.desc}</div>
        </div>
      </div>
      <input type="range" min={0} max={8} step={1} value={idx}
        onChange={e => onChange(SAATY_SCALE[+e.target.value].value)}
        style={{ width: "100%", accentColor: isL ? "var(--accent-left)" : isR ? "var(--accent-right)" : "var(--accent-equal)" }}
      />
      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)", marginTop: 4, userSelect: "none" }}>
        {SAATY_SCALE.map((s, i) => (
          <span key={i} style={{ width: 20, textAlign: "center", color: i === idx ? (isL ? "var(--accent-left)" : isR ? "var(--accent-right)" : "var(--accent-equal)") : undefined, fontWeight: i === idx ? 700 : 400 }}>{s.label}</span>
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-dim)", marginTop: 2, fontFamily: "var(--font-body)" }}>
        <span style={{ color: "var(--accent-left)", opacity: 0.7 }}>← {left.name}</span>
        <span style={{ opacity: 0.5 }}>Equal</span>
        <span style={{ color: "var(--accent-right)", opacity: 0.7 }}>{right.name} →</span>
      </div>
    </div>
  );
}

function AdminDashboard({ onBack }) {
  const [auth, setAuth] = useState(false);
  const [passInput, setPassInput] = useState("");
  const [passErr, setPassErr] = useState(false);
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expandedId, setExpandedId] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const [revealed, setRevealed] = useState(false);
  const [showChangePass, setShowChangePass] = useState(false);
  const [newPass, setNewPass] = useState("");
  const [passMsg, setPassMsg] = useState("");
  const [revealAnimating, setRevealAnimating] = useState(false);

  const login = async () => {
    const cur = await S.getPasscode();
    if (passInput === cur) { setAuth(true); setPassErr(false); } else setPassErr(true);
  };

  const refresh = async () => {
    setLoading(true);
    const all = await S.loadAll();
    all.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    setSubs(all);
    const rev = await S.isRevealed();
    setRevealed(rev);
    setLoading(false);
  };

  // Load data immediately — no auth required to view
  useEffect(() => { refresh(); }, []);

  const handleReveal = async () => {
    setRevealAnimating(true);
    await S.setRevealed(true);
    setRevealed(true);
    setTimeout(() => setRevealAnimating(false), 1500);
  };

  const handleHideResults = async () => {
    await S.setRevealed(false);
    setRevealed(false);
  };

  const handleDelete = async (id) => { await S.deleteOne(id); refresh(); };
  const handleClearAll = async () => { await S.clearAll(); setConfirmClear(false); refresh(); };
  const handleChangePass = async () => {
    if (newPass.trim().length < 4) { setPassMsg("Minimum 4 characters."); return; }
    const ok = await S.setPasscode(newPass.trim());
    setPassMsg(ok ? "Passcode updated." : "Failed.");
    if (ok) { setNewPass(""); setTimeout(() => { setPassMsg(""); setShowChangePass(false); }, 2000); }
  };

  const aggregated = useMemo(() => {
    if (!subs.length) return null;
    const dw = {}; DEFAULT_DIMENSIONS.forEach(d => { dw[d.id] = []; });
    subs.forEach(s => { if (s.weights) Object.entries(s.weights).forEach(([k, v]) => { if (dw[k]) dw[k].push(v); }); });
    const raw = {}; let tot = 0;
    DEFAULT_DIMENSIONS.forEach(d => { const gm = dw[d.id].length ? geometricMean(dw[d.id]) : 0; raw[d.id] = gm; tot += gm; });
    return DEFAULT_DIMENSIONS.map(d => ({ ...d, weight: tot > 0 ? raw[d.id] / tot : 0 }))
      .sort((a, b) => b.weight - a.weight).map((d, i) => ({ ...d, rank: i + 1 }));
  }, [subs]);

  const winnerDimId = aggregated?.[0]?.id;
  const predictions = subs.filter(s => s.prediction);
  const correctPredictions = predictions.filter(s => s.prediction === winnerDimId);

  const consistentCount = subs.filter(s => s.CR <= 0.1).length;

  // ── Dashboard (public) ──
  return (
    <div style={{ animation: "fadeUp 0.4s ease" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <Btn onClick={onBack}>← Back to Survey</Btn>
        <Btn onClick={refresh} style={{ fontSize: 14 }}>↻ Refresh</Btn>
      </div>

      {loading ? (
        <Card><div style={{ textAlign: "center", color: "var(--text-dim)", padding: 20 }}>Loading...</div></Card>
      ) : subs.length === 0 ? (
        <Card>
          <div style={{ textAlign: "center", padding: "40px 20px" }}>
            <div style={{ fontSize: 38, marginBottom: 12 }}>📋</div>
            <div style={{ fontWeight: 600, fontSize: 18, marginBottom: 6, color: "var(--text)" }}>No submissions yet</div>
            <div style={{ fontSize: 15, color: "var(--text-dim)" }}>Waiting for participants to complete their comparisons.</div>
          </div>
        </Card>
      ) : (
        <>
          {/* Summary row */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
            {[
              ["Responses", subs.length, "var(--accent-left)"],
              ["Consistent", `${consistentCount}/${subs.length}`, consistentCount === subs.length ? "#83AC16" : "#C24200"],
              ["Status", revealed ? "Revealed" : "Hidden", revealed ? "#83AC16" : "var(--accent-right)"],
            ].map(([label, val, color]) => (
              <div key={label} style={{ background: "var(--card-bg)", border: "1px solid var(--border)", borderRadius: 12, padding: 16, textAlign: "center" }}>
                <div style={{ fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</div>
                <div style={{ fontFamily: "var(--font-heading)", fontSize: 24, fontWeight: 700, color }}>{val}</div>
              </div>
            ))}
          </div>

          {/* ══ REVEAL ANIMATION ══ */}
          {revealAnimating && aggregated && (
            <div style={{ animation: "fadeUp 0.6s ease", marginBottom: 20 }}>
              <Card style={{
                background: "linear-gradient(135deg, rgba(0,38,105,0.08), rgba(194,66,0,0.08))",
                borderColor: "rgba(0,38,105,0.25)",
                padding: "32px 28px",
              }}>
                <div style={{ textAlign: "center", marginBottom: 20 }}>
                  <div style={{ fontSize: 16, color: "var(--text-dim)", marginBottom: 6, fontFamily: "var(--font-heading)", textTransform: "uppercase", letterSpacing: "0.1em" }}>The group's #1 priority is</div>
                  <div style={{
                    fontSize: 38, fontWeight: 900, letterSpacing: "-0.02em", fontFamily: "var(--font-heading)",
                    color: "#002669",
                    animation: "fadeUp 0.8s ease",
                  }}>{aggregated[0].name}</div>
                  <div style={{ fontFamily: "var(--font-heading)", fontSize: 18, color: "var(--accent-left)", marginTop: 4 }}>
                    {(aggregated[0].weight * 100).toFixed(1)}%
                  </div>
                </div>
              </Card>
            </div>
          )}

          {/* ══ PREDICTION RESULTS ══ */}
          {revealed && predictions.length > 0 && (
            <Card label="Prediction Game Results">
              <div style={{ marginBottom: 14 }}>
                <span style={{ fontWeight: 600, fontSize: 16, color: "var(--text)" }}>
                  {correctPredictions.length} of {predictions.length} predicted correctly!
                </span>
                <span style={{ fontSize: 15, color: "var(--text-dim)", marginLeft: 8 }}>
                  (The #1 was <strong style={{ color: "var(--accent-left)" }}>{aggregated?.[0]?.name}</strong>)
                </span>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {predictions.map((s, i) => {
                  const correct = s.prediction === winnerDimId;
                  const predName = DEFAULT_DIMENSIONS.find(d => d.id === s.prediction)?.name || "?";
                  return (
                    <div key={s.id} style={{
                      display: "flex", alignItems: "center", gap: 8,
                      background: correct ? "rgba(131,172,22,0.1)" : "rgba(255,255,255,0.03)",
                      border: `1px solid ${correct ? "rgba(131,172,22,0.3)" : "var(--border)"}`,
                      borderRadius: 10, padding: "8px 14px",
                    }}>
                      <span style={{ fontSize: 18 }}>{correct ? "🎯" : "❌"}</span>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14, color: correct ? "#83AC16" : "var(--text)" }}>{s.name}</div>
                        <div style={{ fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)" }}>picked {predName}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          {/* ══ AGGREGATED PRIORITIES ══ */}
          {aggregated && (
            <Card label="Aggregated Priorities (Geometric Mean)">
              {aggregated.map(d => (
                <WeightBar key={d.id} name={d.name} weight={d.weight} rank={d.rank} maxWeight={aggregated[0].weight} />
              ))}
              <div style={{ fontSize: 13, color: "var(--text-dim)", marginTop: 10, lineHeight: 1.6 }}>
                Aggregated via geometric mean of individual priority vectors (Saaty & Peniwati, 2008).
              </div>
            </Card>
          )}

          {/* ══ INDIVIDUAL TABLE (no delete buttons — those are admin-only) ══ */}
          <Card label="Individual Weight Breakdown">
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "var(--font-heading)", fontSize: 14 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: "left", padding: "8px 10px", borderBottom: "1px solid var(--border)", color: "var(--text-dim)", fontWeight: 500, fontSize: 12, textTransform: "uppercase" }}>Participant</th>
                    {DEFAULT_DIMENSIONS.map(d => (
                      <th key={d.id} style={{ textAlign: "center", padding: "8px 4px", borderBottom: "1px solid var(--border)", color: "var(--text-dim)", fontWeight: 500, fontSize: 11, textTransform: "uppercase", minWidth: 48 }}>
                        {d.name.slice(0, 5)}
                      </th>
                    ))}
                    <th style={{ textAlign: "center", padding: "8px 4px", borderBottom: "1px solid var(--border)", color: "var(--text-dim)", fontWeight: 500, fontSize: 12 }}>CR</th>
                  </tr>
                </thead>
                <tbody>
                  {subs.map((sub, si) => {
                    const maxW = Math.max(...DEFAULT_DIMENSIONS.map(d => sub.weights?.[d.id] || 0));
                    return (
                      <tr key={sub.id} style={{ cursor: "pointer" }}
                        onClick={() => setExpandedId(expandedId === sub.id ? null : sub.id)}>
                        <td style={{ padding: "10px 10px", borderBottom: "1px solid var(--border)", fontWeight: 600, fontSize: 14 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[si % COLORS.length] }} />
                            {sub.name}
                            {sub.prediction && sub.prediction === winnerDimId && revealed && (
                              <span title="Predicted correctly" style={{ fontSize: 14 }}>🎯</span>
                            )}
                          </div>
                        </td>
                        {DEFAULT_DIMENSIONS.map(d => {
                          const w = sub.weights?.[d.id] || 0;
                          const int = maxW > 0 ? w / maxW : 0;
                          return (
                            <td key={d.id} style={{
                              textAlign: "center", padding: "10px 4px", borderBottom: "1px solid var(--border)",
                              color: int > 0.8 ? "var(--accent-left)" : "var(--text)",
                              fontWeight: int > 0.8 ? 700 : 400,
                              background: `rgba(0,38,105,${int * 0.12})`,
                            }}>{(w * 100).toFixed(1)}</td>
                          );
                        })}
                        <td style={{
                          textAlign: "center", padding: "10px 4px", borderBottom: "1px solid var(--border)",
                          color: (sub.CR || 0) <= 0.1 ? "#83AC16" : "#C24200", fontWeight: 600,
                        }}>{((sub.CR || 0) * 100).toFixed(1)}%</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {expandedId && (() => {
              const sub = subs.find(s => s.id === expandedId);
              if (!sub) return null;
              const ranked = DEFAULT_DIMENSIONS.map(d => ({ ...d, weight: sub.weights?.[d.id] || 0 }))
                .sort((a, b) => b.weight - a.weight).map((d, i) => ({ ...d, rank: i + 1 }));
              return (
                <div style={{ marginTop: 16, padding: "16px 18px", background: "var(--input-bg)", borderRadius: 12, animation: "fadeUp 0.3s ease" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
                    <span style={{ fontWeight: 700, fontSize: 16, color: "var(--text)" }}>{sub.name}'s Results</span>
                    <span style={{ fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)" }}>{new Date(sub.timestamp).toLocaleString()}</span>
                  </div>
                  {sub.prediction && (
                    <div style={{ fontSize: 14, color: "var(--text-dim)", marginBottom: 10 }}>
                      Predicted #1: <strong style={{ color: "var(--accent-left)" }}>{DEFAULT_DIMENSIONS.find(d => d.id === sub.prediction)?.name}</strong>
                      {revealed && (sub.prediction === winnerDimId ? <span style={{ color: "#83AC16", marginLeft: 6 }}>✓ Correct!</span> : <span style={{ color: "#C24200", marginLeft: 6 }}>✗ Incorrect</span>)}
                    </div>
                  )}
                  {ranked.map(d => <WeightBar key={d.id} name={d.name} weight={d.weight} rank={d.rank} maxWeight={ranked[0].weight} />)}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginTop: 12 }}>
                    {[["λ max", sub.lambdaMax?.toFixed(4)], ["CI", sub.CI?.toFixed(4)], ["CR", ((sub.CR || 0) * 100).toFixed(2) + "%"]].map(([l, v]) => (
                      <div key={l} style={{ background: "var(--badge-bg)", borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                        <div style={{ fontFamily: "var(--font-heading)", fontSize: 11, color: "var(--text-dim)" }}>{l}</div>
                        <div style={{ fontFamily: "var(--font-heading)", fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
          </Card>

          {/* ══ DIMENSION COMPARISON ══ */}
          <Card label="Dimension Comparison Across Participants">
            {DEFAULT_DIMENSIONS.map(dim => {
              const vals = subs.map(s => ({ name: s.name, w: s.weights?.[dim.id] || 0 }));
              const maxW = Math.max(...vals.map(v => v.w), 0.01);
              return (
                <div key={dim.id} style={{ marginBottom: 16 }}>
                  <div style={{ fontWeight: 600, fontSize: 15, color: "var(--text)", marginBottom: 6 }}>{dim.name}</div>
                  {vals.map((v, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[i % COLORS.length] }} />
                      <span style={{ fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)", width: 70, flexShrink: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{v.name}</span>
                      <div style={{ flex: 1, height: 6, borderRadius: 3, background: "var(--bar-track)", overflow: "hidden" }}>
                        <div style={{ height: "100%", borderRadius: 3, width: `${(v.w / maxW) * 100}%`, background: COLORS[i % COLORS.length], transition: "width 0.5s ease" }} />
                      </div>
                      <span style={{ fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)", width: 40, textAlign: "right" }}>{(v.w * 100).toFixed(1)}%</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </Card>
        </>
      )}

      {/* ══ FACILITATOR CONTROLS (passcode-protected) ══ */}
      <Card label="Facilitator Controls" style={{ borderColor: "rgba(0,38,105,0.15)" }}>
        {!auth ? (
          <div>
            <p style={{ fontSize: 14, color: "var(--text-dim)", marginBottom: 14, lineHeight: 1.6 }}>
              Reveal results, delete submissions, and manage the session. Enter the admin passcode to unlock.
            </p>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <input type="password" placeholder="Admin passcode" value={passInput}
                onChange={e => { setPassInput(e.target.value); setPassErr(false); }}
                onKeyDown={e => { if (e.key === "Enter") login(); }}
                style={{
                  flex: 1, background: "var(--input-bg)", borderRadius: 10, padding: "10px 14px",
                  color: "var(--text)", fontSize: 15, outline: "none", fontFamily: "var(--font-body)",
                  border: `1px solid ${passErr ? "rgba(194,66,0,0.6)" : "var(--border)"}`,
                }}
              />
              <Btn primary onClick={login}>Unlock</Btn>
            </div>
            {passErr && <div style={{ fontSize: 14, color: "#C24200", marginTop: 10 }}>Incorrect passcode.</div>}
          </div>
        ) : (
          <div style={{ animation: "fadeUp 0.3s ease" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <div style={{ width: 8, height: 8, borderRadius: 4, background: "#83AC16" }} />
              <span style={{ fontSize: 14, color: "#83AC16", fontWeight: 600 }}>Admin unlocked</span>
            </div>

            {/* Reveal / Hide */}
            <div style={{ marginBottom: 16, padding: "16px 18px", background: "var(--input-bg)", borderRadius: 12 }}>
              <div style={{ fontFamily: "var(--font-heading)", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text-dim)", marginBottom: 10, fontWeight: 700 }}>Results Visibility</div>
              {!revealed ? (
                <div>
                  <div style={{ fontSize: 14, color: "var(--text-dim)", marginBottom: 10 }}>
                    Results are currently <strong>hidden</strong> from participants.
                  </div>
                  <button onClick={handleReveal} style={{
                    background: "linear-gradient(135deg, var(--accent-left), var(--accent-right))",
                    border: "none", borderRadius: 12, padding: "14px 36px",
                    color: "#fff", fontWeight: 700, fontSize: 16, cursor: "pointer",
                    fontFamily: "var(--font-heading)", letterSpacing: "-0.01em",
                    boxShadow: "0 4px 20px rgba(0,38,105,0.25)",
                  }}>
                    Reveal Results to Everyone
                  </button>
                </div>
              ) : (
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#83AC16", marginBottom: 2 }}>Results are live</div>
                    <div style={{ fontSize: 13, color: "var(--text-dim)" }}>All participants can see group results.</div>
                  </div>
                  <Btn onClick={handleHideResults} style={{ fontSize: 13 }}>Hide Again</Btn>
                </div>
              )}
            </div>

            {/* Delete individual submissions */}
            {subs.length > 0 && (
              <div style={{ marginBottom: 16, padding: "16px 18px", background: "var(--input-bg)", borderRadius: 12 }}>
                <div style={{ fontFamily: "var(--font-heading)", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text-dim)", marginBottom: 10, fontWeight: 700 }}>Delete Individual Submissions</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {subs.map((sub, si) => (
                    <div key={sub.id} style={{
                      display: "flex", alignItems: "center", gap: 8,
                      background: "var(--card-bg)", border: "1px solid var(--border)",
                      borderRadius: 8, padding: "6px 12px",
                    }}>
                      <div style={{ width: 6, height: 6, borderRadius: 2, background: COLORS[si % COLORS.length] }} />
                      <span style={{ fontSize: 13, color: "var(--text)" }}>{sub.name}</span>
                      <button onClick={() => handleDelete(sub.id)}
                        style={{ background: "none", border: "none", cursor: "pointer", color: "#C24200", fontSize: 16, padding: "0 2px", lineHeight: 1, fontWeight: 700 }}
                        title={`Delete ${sub.name}'s submission`}>×</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Change passcode */}
            <div style={{ marginBottom: 16, padding: "16px 18px", background: "var(--input-bg)", borderRadius: 12 }}>
              <div style={{ fontFamily: "var(--font-heading)", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text-dim)", marginBottom: 10, fontWeight: 700 }}>Change Passcode</div>
              {!showChangePass ? (
                <Btn onClick={() => setShowChangePass(true)} style={{ fontSize: 13 }}>Change Admin Passcode</Btn>
              ) : (
                <div>
                  <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 8 }}>
                    <input type="password" placeholder="New passcode (min 4 chars)" value={newPass}
                      onChange={e => { setNewPass(e.target.value); setPassMsg(""); }}
                      onKeyDown={e => { if (e.key === "Enter") handleChangePass(); }}
                      style={{ flex: "1 1 180px", background: "var(--card-bg)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 12px", color: "var(--text)", fontSize: 15, outline: "none", fontFamily: "var(--font-body)" }}
                    />
                    <Btn primary onClick={handleChangePass} style={{ padding: "8px 16px", fontSize: 13 }}>Save</Btn>
                    <Btn onClick={() => { setShowChangePass(false); setNewPass(""); setPassMsg(""); }} style={{ fontSize: 13 }}>Cancel</Btn>
                  </div>
                  {passMsg && <div style={{ fontSize: 14, color: passMsg.includes("updated") ? "#83AC16" : "#C24200" }}>{passMsg}</div>}
                </div>
              )}
            </div>

            {/* Clear all */}
            <div style={{ padding: "16px 18px", background: "rgba(194,66,0,0.03)", border: "1px solid rgba(194,66,0,0.15)", borderRadius: 12 }}>
              <div style={{ fontFamily: "var(--font-heading)", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: "#C24200", marginBottom: 10, fontWeight: 700 }}>Danger Zone</div>
              {!confirmClear ? (
                <Btn danger onClick={() => setConfirmClear(true)}>Clear All Submissions & Reset</Btn>
              ) : (
                <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ fontSize: 14, color: "#C24200" }}>This clears all data and hides results. Cannot be undone.</span>
                  <Btn danger onClick={handleClearAll}>Yes, clear all</Btn>
                  <Btn onClick={() => setConfirmClear(false)}>Cancel</Btn>
                </div>
              )}
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

function AHPTool() {
  const [mode, setMode] = useState("presentation");
  const [step, setStep] = useState("identify"); // identify | learn | predict | compare | submitted | results
  const [name, setName] = useState("");
  const [learnIdx, setLearnIdx] = useState(0);
  const [prediction, setPrediction] = useState(null);
  const [comparisons, setComparisons] = useState({});
  const [personalResults, setPersonalResults] = useState(null);
  const [saving, setSaving] = useState(false);
  const [revealed, setRevealed] = useState(false);
  const [groupResults, setGroupResults] = useState(null);
  const [allSubs, setAllSubs] = useState([]);
  const pollRef = useRef(null);

  const dims = DEFAULT_DIMENSIONS;
  const pairs = useMemo(() => generatePairs(dims), [dims.length]);

  const setComp = useCallback((i, j, v) => {
    setComparisons(prev => ({ ...prev, [`${i}-${j}`]: v }));
  }, []);

  const calculate = () => {
    const n = dims.length;
    const m = Array.from({ length: n }, () => Array(n).fill(1));
    for (const [i, j] of pairs) { const v = comparisons[`${i}-${j}`] ?? 1; m[i][j] = v; m[j][i] = 1 / v; }
    const res = computeAHP(m, n);
    const ranked = dims.map((d, i) => ({ ...d, weight: res.weights[i] }))
      .sort((a, b) => b.weight - a.weight).map((d, i) => ({ ...d, rank: i + 1 }));
    return { ...res, ranked };
  };

  const submitResults = async () => {
    if (saving) return; // Prevent double-click
    setSaving(true);
    try {
      const results = calculate();
      setPersonalResults(results);
      const wm = {}; results.ranked.forEach(d => { wm[d.id] = d.weight; });
      const sub = {
        id: `${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
        name: name.trim(), timestamp: new Date().toISOString(),
        prediction, comparisons: { ...comparisons }, weights: wm,
        lambdaMax: results.lambdaMax, CI: results.CI, CR: results.CR,
      };
      await S.save(sub);
      setStep("submitted");
    } catch (e) {
      console.error("Submit failed:", e);
      alert("Something went wrong saving your results. Please try again.");
    } finally {
      setSaving(false);
    }
  };

  // Poll for reveal status when waiting
  useEffect(() => {
    if (step === "submitted") {
      const check = async () => {
        const rev = await S.isRevealed();
        if (rev) {
          setRevealed(true);
          const all = await S.loadAll();
          setAllSubs(all);
          // Compute group aggregated
          const dw = {}; dims.forEach(d => { dw[d.id] = []; });
          all.forEach(s => { if (s.weights) Object.entries(s.weights).forEach(([k, v]) => { if (dw[k]) dw[k].push(v); }); });
          const raw = {}; let tot = 0;
          dims.forEach(d => { const gm = dw[d.id].length ? geometricMean(dw[d.id]) : 0; raw[d.id] = gm; tot += gm; });
          const agg = dims.map(d => ({ ...d, weight: tot > 0 ? raw[d.id] / tot : 0 }))
            .sort((a, b) => b.weight - a.weight).map((d, i) => ({ ...d, rank: i + 1 }));
          setGroupResults(agg);
          setStep("results");
          if (pollRef.current) clearInterval(pollRef.current);
        }

                      padding: "28px 28px 20px",
                      borderBottom: `1px solid ${d.color}20`,
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 10 }}>
                        <div style={{
                          width: 52, height: 52, borderRadius: 16,
                          background: `${d.color}18`, border: `1.5px solid ${d.color}30`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 28,
                        }}>{d.icon}</div>
                        <div>
                          <div style={{
                            fontFamily: "var(--font-heading)", fontSize: 12, textTransform: "uppercase",
                            letterSpacing: "0.1em", color: "var(--text-dim)", marginBottom: 3,
                          }}>Dimension {learnIdx + 1} of {dims.length}</div>
                          <div style={{
                            fontSize: 26, fontWeight: 900, fontFamily: "var(--font-heading)", letterSpacing: "-0.02em", color: d.color,
                          }}>{d.name}</div>
                        </div>
                      </div>
                      <div style={{ fontSize: 16, color: "var(--text)", lineHeight: 1.6 }}>
                        {d.desc}
                      </div>
                    </div>

                    <div style={{ padding: "20px 28px 24px" }}>
                      {/* Why it matters */}
                      <div style={{ marginBottom: 20 }}>
                        <div style={{
                          fontFamily: "var(--font-heading)", fontSize: 12, textTransform: "uppercase",
                          letterSpacing: "0.08em", color: d.color, marginBottom: 8, fontWeight: 600,
                        }}>Why It Matters</div>
                        <div style={{ fontSize: 15.5, color: "var(--text)", lineHeight: 1.7, fontStyle: "italic", opacity: 0.9 }}>
                          "{d.why}"
                        </div>
                      </div>

                      {/* Good vs Bad */}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
                        <div style={{
                          background: "rgba(131,172,22,0.06)", border: "1px solid rgba(131,172,22,0.15)",
                          borderRadius: 12, padding: "14px 16px",
                        }}>
                          <div style={{
                            display: "flex", alignItems: "center", gap: 6, marginBottom: 8,
                            fontFamily: "var(--font-heading)", fontSize: 12, textTransform: "uppercase",
                            letterSpacing: "0.08em", color: "#83AC16", fontWeight: 600,
                          }}>
                            <span style={{ fontSize: 16 }}>✓</span> Good Example
                          </div>
                          <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.6, opacity: 0.85 }}>
                            {d.good}
                          </div>
                        </div>
                        <div style={{
                          background: "rgba(255,80,80,0.06)", border: "1px solid rgba(255,80,80,0.15)",
                          borderRadius: 12, padding: "14px 16px",
                        }}>
                          <div style={{
                            display: "flex", alignItems: "center", gap: 6, marginBottom: 8,
                            fontFamily: "var(--font-heading)", fontSize: 12, textTransform: "uppercase",
                            letterSpacing: "0.08em", color: "#C24200", fontWeight: 600,
                          }}>
                            <span style={{ fontSize: 16 }}>✗</span> What Goes Wrong
                          </div>
                          <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.6, opacity: 0.85 }}>
                            {d.bad}
                          </div>
                        </div>
                      </div>

                      {/* Practical examples */}
                      <div style={{ marginBottom: 4 }}>
                        <div style={{
                          fontFamily: "var(--font-heading)", fontSize: 12, textTransform: "uppercase",
                          letterSpacing: "0.08em", color: "var(--text-dim)", marginBottom: 10, fontWeight: 500,
                        }}>In Practice</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {d.examples.map((ex, i) => (
                            <div key={i} style={{
                              display: "flex", alignItems: "flex-start", gap: 10,
                              background: "var(--input-bg)", borderRadius: 10, padding: "10px 14px",
                            }}>
                              <div style={{
                                width: 20, height: 20, borderRadius: 6, flexShrink: 0,
                                background: `${d.color}18`, border: `1px solid ${d.color}25`,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                fontFamily: "var(--font-heading)", fontSize: 12, fontWeight: 700, color: d.color,
                                marginTop: 1,
                              }}>{i + 1}</div>
                              <div style={{ fontSize: 14.5, color: "var(--text)", lineHeight: 1.5, opacity: 0.85 }}>
                                {ex}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </Card>

                  {/* Navigation */}
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 12 }}>
                    <Btn onClick={() => { if (isFirst) setStep("identify"); else setLearnIdx(learnIdx - 1); }}>
                      ← {isFirst ? "Back" : "Previous"}
                    </Btn>
                    {isLast ? (
                      <Btn primary onClick={() => setStep("predict")}>
                        Now Make Your Prediction →
                      </Btn>
                    ) : (
                      <Btn primary onClick={() => setLearnIdx(learnIdx + 1)}>
                        Next: {dims[learnIdx + 1].name} →
                      </Btn>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── PREDICT ── */}
            {step === "predict" && (
              <div style={{ animation: "fadeUp 0.4s ease" }}>
                <Card label="Make Your Prediction">
                  <p style={{ fontSize: 15, color: "var(--text-dim)", marginBottom: 16, lineHeight: 1.6 }}>
                    Now that you know the dimensions: which one do you think the <strong>group</strong> will rank as #1?
                  </p>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                    {dims.map(d => {
                      const sel = prediction === d.id;
                      return (
                        <button key={d.id} onClick={() => setPrediction(d.id)} style={{
                          background: sel ? `${d.color}18` : "var(--input-bg)",
                          border: `1.5px solid ${sel ? d.color : "var(--border)"}`,
                          borderRadius: 12, padding: "14px 16px", cursor: "pointer", textAlign: "left", transition: "all 0.2s",
                        }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ fontSize: 20 }}>{d.icon}</span>
                              <span style={{ fontWeight: 600, fontSize: 15.5, color: sel ? d.color : "var(--text)" }}>{d.name}</span>
                            </div>
                            <div style={{
                              width: 18, height: 18, borderRadius: 10,
                              border: `2px solid ${sel ? d.color : "var(--border)"}`,
                              background: sel ? d.color : "transparent",
                              display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s",
                            }}>
                              {sel && <div style={{ width: 6, height: 6, borderRadius: 3, background: "#fff" }} />}
                            </div>
                          </div>
                          <div style={{ fontSize: 13, color: "var(--text-dim)", marginTop: 5, lineHeight: 1.4 }}>{d.desc}</div>
                        </button>
                      );
                    })}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 12 }}>
                    <Btn onClick={() => { setLearnIdx(dims.length - 1); setStep("learn"); }}>← Review Dimensions</Btn>
                    <Btn primary disabled={!prediction} onClick={() => setStep("compare")}>Lock In & Start Comparing →</Btn>
                  </div>
                </Card>
              </div>
            )}

            {/* ── COMPARE ── */}
            {step === "compare" && (
              <div style={{ animation: "fadeUp 0.4s ease" }}>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                    <span style={{ fontFamily: "var(--font-heading)", fontSize: 13, color: "var(--text-dim)" }}>{name} · Progress</span>
                    <span style={{ fontFamily: "var(--font-heading)", fontSize: 13, color: "var(--accent-left)" }}>{completedCount} / {totalPairs}</span>
                  </div>
                  <div style={{ height: 4, borderRadius: 2, background: "var(--bar-track)", overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 2, width: `${(completedCount / totalPairs) * 100}%`, background: "linear-gradient(90deg, var(--accent-left), var(--accent-right))", transition: "width 0.4s ease" }} />
                  </div>
                </div>

                <p style={{ fontSize: 14.5, color: "var(--text-dim)", marginBottom: 16, lineHeight: 1.5 }}>
                  For each pair, slide toward the dimension you consider more important. Scale: 1 (equal) to 9 (extreme).
                </p>

                {pairs.map(([i, j]) => (
                  <ComparisonSlider key={`${i}-${j}`} left={dims[i]} right={dims[j]}
                    value={comparisons[`${i}-${j}`] ?? 1} onChange={v => setComp(i, j, v)} />
                ))}

                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 12 }}>
                  <Btn onClick={() => setStep("predict")}>← Back</Btn>
                  <Btn primary disabled={saving} onClick={submitResults}>
                    {saving ? "Submitting..." : "Submit →"}
                  </Btn>
                </div>
              </div>
            )}

            {/* ── SUBMITTED (waiting for reveal) ── */}
            {step === "submitted" && (
              <div style={{ animation: "fadeUp 0.4s ease" }}>
                <Card>
                  <div style={{ textAlign: "center", padding: "50px 20px" }}>
                    <div style={{
                      width: 64, height: 64, borderRadius: 20, margin: "0 auto 20px",
                      background: "rgba(0,38,105,0.1)", border: "2px solid rgba(0,38,105,0.2)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}>
                      <div style={{ width: 24, height: 24, border: "3px solid var(--accent-left)", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
                    </div>
                    <div style={{ fontWeight: 700, fontSize: 22, marginBottom: 8, color: "var(--text)" }}>
                      Thanks, {name}!
                    </div>
                    <div style={{ fontSize: 16, color: "var(--text-dim)", lineHeight: 1.6, maxWidth: 400, margin: "0 auto", marginBottom: 16 }}>
                      Your response is saved. Waiting for the facilitator to reveal the group results...
                    </div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      <div style={{ width: 6, height: 6, borderRadius: 3, background: "var(--accent-left)", animation: "pulse 1.5s ease infinite" }} />
                      <span style={{ fontFamily: "var(--font-heading)", fontSize: 13, color: "var(--text-dim)" }}>
                        Listening for reveal...
                      </span>
                    </div>
                    {prediction && (
                      <div style={{ marginTop: 20, padding: "12px 16px", background: "var(--input-bg)", borderRadius: 10, display: "inline-block" }}>
                        <span style={{ fontSize: 14, color: "var(--text-dim)" }}>Your prediction: </span>
                        <strong style={{ color: "var(--accent-left)", fontSize: 15 }}>{dims.find(d => d.id === prediction)?.name}</strong>
                      </div>
                    )}
                  </div>
                </Card>
              </div>
            )}

            {/* ── RESULTS (after reveal) ── */}
            {step === "results" && groupResults && personalResults && (
              <div style={{ animation: "fadeUp 0.5s ease" }}>
                {/* Big reveal */}
                <Card style={{
                  background: "linear-gradient(135deg, rgba(0,38,105,0.08), rgba(194,66,0,0.08))",
                  borderColor: "rgba(0,38,105,0.25)", padding: "32px 28px",
                }}>
                  <div style={{ textAlign: "center", marginBottom: 4 }}>
                    <div style={{ fontSize: 15, color: "var(--text-dim)", marginBottom: 6, fontFamily: "var(--font-heading)", textTransform: "uppercase", letterSpacing: "0.1em" }}>The group's #1 priority is</div>
                    <div style={{
                      fontSize: 38, fontWeight: 900, letterSpacing: "-0.02em", fontFamily: "var(--font-heading)",
                      color: "#002669",
                    }}>{groupResults[0].name}</div>
                    <div style={{ fontFamily: "var(--font-heading)", fontSize: 18, color: "var(--accent-left)", marginTop: 4 }}>
                      {(groupResults[0].weight * 100).toFixed(1)}%
                    </div>
                  </div>
                </Card>

                {/* Prediction outcome */}
                {prediction && (
                  <Card>
                    <div style={{ textAlign: "center", padding: "12px 0" }}>
                      {prediction === groupResults[0].id ? (
                        <>
                          <div style={{ fontSize: 38, marginBottom: 8 }}>🎯</div>
                          <div style={{ fontWeight: 700, fontSize: 20, color: "#83AC16", marginBottom: 4 }}>You nailed it!</div>
                          <div style={{ fontSize: 15, color: "var(--text-dim)" }}>You predicted <strong>{dims.find(d => d.id === prediction)?.name}</strong> — and that's exactly what the group chose.</div>
                        </>
                      ) : (
                        <>
                          <div style={{ fontSize: 38, marginBottom: 8 }}>🤔</div>
                          <div style={{ fontWeight: 700, fontSize: 20, color: "var(--accent-right)", marginBottom: 4 }}>Not quite!</div>
                          <div style={{ fontSize: 15, color: "var(--text-dim)" }}>
                            You predicted <strong>{dims.find(d => d.id === prediction)?.name}</strong>, but the group went with <strong style={{ color: "var(--accent-left)" }}>{groupResults[0].name}</strong>.
                          </div>
                        </>
                      )}
                    </div>
                  </Card>
                )}

                {/* Group priorities */}
                <Card label="Group Priority Weights">
                  {groupResults.map(d => <WeightBar key={d.id} name={d.name} weight={d.weight} rank={d.rank} maxWeight={groupResults[0].weight} />)}
                </Card>

                {/* Your priorities */}
                <Card label="Your Priority Weights">
                  <div style={{ marginBottom: 8 }}>
                    <span style={{ fontFamily: "var(--font-heading)", fontSize: 13, color: personalResults.CR <= 0.1 ? "#83AC16" : "#C24200" }}>
                      {personalResults.CR <= 0.1 ? "✓ Consistent" : "⚠ Inconsistent"} (CR: {(personalResults.CR * 100).toFixed(1)}%)
                    </span>
                  </div>
                  {personalResults.ranked.map(d => <WeightBar key={d.id} name={d.name} weight={d.weight} rank={d.rank} maxWeight={personalResults.ranked[0].weight} />)}
                </Card>

                <div style={{ display: "flex", justifyContent: "center", gap: 12 }}>
                  <Btn onClick={reset}>Submit Another Response</Btn>
                </div>
              </div>
            )}
          </>
        )}

        {/* Footer */}
        <div style={{ marginTop: 40, paddingTop: 16, borderTop: "1px solid var(--border)", textAlign: "center" }}>
          <div style={{ width: 40, height: 3, borderRadius: 2, background: "#C24200", margin: "0 auto 12px" }} />
          <div style={{ fontFamily: "var(--font-heading)", fontSize: 12, color: "var(--text-dim)", letterSpacing: "0.06em", lineHeight: 1.6, fontWeight: 400 }}>
            City of Tucson · Information Technology · IT Data Program
          </div>
        </div>
      </div>
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AHPTool));
  </script>
</body>
</html>
